name: Lint

on:
  push:
  pull_request:

jobs:
  lint-rust:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-
      - name: Format code
        run: cargo fmt
        working-directory: contracts
      - name: Run Clippy
        run: >
          cargo clippy
          -p lineproof-queue-factory
          -p lineproof-queue
          -p lineproof-enrollment
          -p lineproof-escrow
          -p lineproof-identity
          -- -D warnings
        working-directory: contracts

  lint-sdk:
    name: SDK Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck SDK
        run: pnpm --filter @lineproof/sdk typecheck

  lint-backend:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build SDK (backend imports @lineproof/sdk)
        run: pnpm --filter @lineproof/sdk build
      - name: Typecheck backend
        run: pnpm --filter @lineproof/backend exec tsc --noEmit

  lint-frontend:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck frontend
        run: pnpm --filter @lineproof/frontend exec tsc --noEmit
