name: Lint

on:
  push:
  pull_request:

jobs:
  lint-rust:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-
      - name: Format code
        run: cargo fmt
        working-directory: contracts
      - name: Run Clippy
        run: >
          cargo clippy
          -p lineproof-queue-factory
          -p lineproof-queue
          -p lineproof-enrollment
          -p lineproof-escrow
          -p lineproof-identity
          -- -D warnings
        working-directory: contracts

  lint-sdk:
    name: SDK Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck SDK
        run: pnpm --filter @lineproof/sdk typecheck

  lint-backend:
    name: Backend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Build SDK (backend imports @lineproof/sdk)
        run: pnpm --filter @lineproof/sdk build
      - name: Typecheck backend
        run: pnpm --filter @lineproof/backend exec tsc --noEmit

  lint-frontend:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck frontend
        run: pnpm --filter @lineproof/frontend exec tsc --noEmit
