# Dependencies
# Automatically generated by `cargo new`.
# This workspace acts as a reference clippy/cargo-check target for the whole repo.

[workspace]
members = [
    "lineproof-queue-factory",
    "lineproof-queue",
    "lineproof-enrollment",
    "lineproof-escrow",
    "lineproof-identity",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
license = "MIT"
edition = "2021"
repository = "https://github.com/lineproof/lineproof"
homepage = "https://lineproof.dev"
documentation = "https://docs.lineproof.dev"

[workspace.dependencies]
soroban-sdk = "22.0"
thiserror = "2"
url = "2.5.4"

[patch.crates-io]
soroban-env-host = { path = ".patched/soroban-env-host" }

[profile.release]
opt-level = "z"
overflow-checks = true
debug = false
panic = "abort"
codegen-units = 1
lto = true
