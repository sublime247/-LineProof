# Dependencies
# Automatically generated by `cargo new` and customized for the LineProof project.

[package]
name = "lineproof-enrollment"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Enrollment module for LineProof: duplicate prevention and identity checks."
homepage = "https://lineproof.dev"
repository = "https://github.com/lineproof/lineproof"
documentation = "https://docs.lineproof.dev"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
soroban-sdk = "22.0"
thiserror = "2"

[dev-dependencies]
soroban-sdk = { version = "22.0", features = ["testutils"] }
pretty_assertions = "1.4"

